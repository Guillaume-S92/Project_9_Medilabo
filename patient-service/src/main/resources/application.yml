server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: patient-service

  datasource:
    url: ${PATIENT_DB_URL:jdbc:mysql://localhost:3306/patientdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${PATIENT_DB_USERNAME:patient}
    password: ${PATIENT_DB_PASSWORD:patientpassword}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

security:
  jwt:
    secret: ${JWT_SECRET:change-me-with-at-least-32-characters}
    expiration-minutes: 120

management:
  endpoints:
    web:
      exposure:
        include: health,info