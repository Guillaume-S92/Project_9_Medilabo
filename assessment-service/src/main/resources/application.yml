server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: assessment-service

clients:
  patient-service-base-url: ${PATIENT_SERVICE_BASE_URL:http://localhost:8082}
  note-service-base-url: ${NOTE_SERVICE_BASE_URL:http://localhost:8083}

security:
  jwt:
    secret: ${JWT_SECRET:change-me-with-at-least-32-characters}
    expiration-minutes: 120

management:
  endpoints:
    web:
      exposure:
        include: health,info
